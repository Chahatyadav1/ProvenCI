apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins-agent: slsa-pipeline
spec:
  restartPolicy: Never
  tolerations:
    - operator: Exists
  volumes:
    - name: workspace-volume
      emptyDir: {}

  containers:

    - name: git
      image: alpine/git:v2.54.0@sha256:8d6ede0b29c666ac111c732468c4d758c1c08f054f211dd98f15d421a6ffab40
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache github-cli yq
          sleep 999999
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

    - name: crane
      image: gcr.io/go-containerregistry/crane@sha256:1b1fb24d2b1bb27a9daf81a588157e68463876904e8e537a812edba6284fb252
      command: ["sleep"]
      args: ["999999"]
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

    - name: docker
      image: docker:28-dind@sha256:2a232a42256f70d78e3cc5d2b5d6b3276710a0de0596c145f627ecfae90282ac
      env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
      tty: true
      securityContext:
        privileged: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "300m"
          memory: "512Mi"
        limits:
          cpu: "1500m"
          memory: "1.5Gi"

    - name: trivy
      image: aquasec/trivy:0.71.2@sha256:f5d0e600ecda7449e2a9b272805aef698631d3bb3f3a739a750de2c6819acdc9
      command: ["sleep"]
      args: ["999999"]
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    - name: syft
      image: alpine:3.19
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache curl
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.45.1
          sleep 999999
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

    - name: grype
      image: alpine:3.19
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache curl
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin v0.114.0
          sleep 999999
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "150m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    - name: cosign
      image: alpine:3.19
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache curl
          curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          sleep 999999
      tty: true
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"