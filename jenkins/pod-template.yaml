apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins-agent: slsa-pipeline
spec:
  volumes:
  - name: workspace-volume
    emptyDir: {}
  restartPolicy: Never
  containers:
    - name: git
      image: alpine/git:2.45.2
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      tty: true
      command: ["/bin/sh", "-c"]
      args: ["apk add --no-cache github-cli yq && sleep 999999"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

    - name: crane
      image: gcr.io/go-containerregistry/crane:debug
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      command: ["sleep"]
      args: ["999999"]
      tty: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"

    - name: docker
      image: docker:28-dind
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      env:
      - name: DOCKER_TLS_CERTDIR
        value: ""
      tty: true
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "2000m"
          memory: "2Gi"

    - name: trivy
      image: aquasec/trivy:0.71.2@sha256:f5d0e600ecda7449e2a9b272805aef698631d3bb3f3a739a750de2c6819acdc9
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      command: ["sleep"]
      args: ["999999"]
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    - name: syft
      image: anchore/syft:v1.45.1@sha256:c6d5719f48f5a5986acf2847eb1ed7c53176e712d5721fcd156184cfb262f6eb
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      command: ["sleep"]
      args: ["999999"]
      tty: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

    - name: grype
      image: anchore/grype:v0.114.0@sha256:7a9fc7f89ccef78ae5a7691a115d3f0d41b1f319d589dd8cc1dcb9ab3f01dd28
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      command: ["sleep"]
      args: ["999999"]
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    - name: cosign
      image: gcr.io/projectsigstore/cosign:v2.2.4
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
      command: ["sleep"]
      args: ["999999"]
      tty: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"