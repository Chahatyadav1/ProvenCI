apiVersion: apps/v1
kind: Deployment
metadata:
  name: slsa-demo-app
  namespace: slsa-demo-app
  labels:
    app: slsa-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slsa-demo-app
  template:
    metadata:
      labels:
        app: slsa-demo-app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
      containers:
        - name: slsa-demo-app
          image: "docker.io/chahatyadav1/provenci:latest"
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
