apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: kyverno-policy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Chahatyadav1/ProvenCI.git
    path: kyverno
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true